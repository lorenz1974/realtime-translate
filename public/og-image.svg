<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="50%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="55%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g filter="url(#softblur)" opacity="0.55">
    <circle cx="80"   cy="90"  r="190" fill="#a5b4fc"/>
    <circle cx="1130" cy="540" r="230" fill="#f9a8d4"/>
    <circle cx="950"  cy="120" r="150" fill="#67e8f9"/>
  </g>

  <g transform="translate(95, 180)">
    <rect width="180" height="180" rx="40" fill="url(#logo-grad)"/>
    <g fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" transform="translate(38, 56)">
      <path d="M4 18 L102 18"/>
      <path d="M82 0 L102 18 L82 36"/>
      <path d="M102 52 L4 52"/>
      <path d="M24 34 L4 52 L24 70"/>
    </g>
  </g>

  <g transform="translate(310, 235)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <text font-size="78" font-weight="800" fill="url(#title-grad)">Realtime Translate</text>
    <text y="78" font-size="36" font-weight="600" fill="#1e293b">Traduzione vocale in tempo reale</text>
    <text y="132" font-size="26" font-weight="400" fill="#64748b">OpenAI Realtime API · React · Bootstrap 5</text>
  </g>

  <g transform="translate(95, 515)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <g>
      <rect width="178" height="58" rx="29" fill="#1e293b"/>
      <text x="89" y="38" font-size="22" font-weight="700" text-anchor="middle" fill="#a5b4fc">⚡ DEMO</text>
    </g>
    <g transform="translate(198, 0)">
      <rect width="320" height="58" rx="29" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="160" y="38" font-size="22" font-weight="600" text-anchor="middle" fill="#1e293b">gpt-realtime · WebRTC · PWA</text>
    </g>
  </g>
